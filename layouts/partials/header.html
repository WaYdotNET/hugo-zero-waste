<header class="site-header">
  <div class="site-header-in">
    <a class="site-brand" href="{{ "/" | relLangURL }}" aria-label="{{ site.Title }} — home">
      {{ if site.Params.logo }}
      <img class="brand-logo" src="{{ site.Params.logo | relURL }}" alt="{{ site.Params.brand | default site.Title }}">
      {{ else }}
      <span class="b-name"><span class="br">[</span>WaY<span class="dot">dot</span>NET<span class="br">]</span></span>
      {{ with site.Params.brandCaption }}<span class="b-cap">{{ . }}</span>{{ end }}
      {{ end }}
    </a>
    <nav class="site-nav" aria-label="{{ i18n "main_nav" }}">
      {{ range site.Menus.main }}<a href="{{ .URL | relLangURL }}">{{ .Name }}</a>{{ end }}
      {{ partial "lang-switch.html" . }}
    </nav>
  </div>
</header>
