{{ with hugo.Data.talks }}
<section class="home-section">
  <h2 class="label">{{ i18n "talks" }}</h2>
  <ul class="card-list">
    {{ range . }}
    <li>
      <a href="{{ .url | relURL }}">{{ .title }}</a>
      <span class="meta">{{ .event }}{{ with .with }} · {{ i18n "with_speaker" }} {{ . }}{{ end }}</span>
      {{ with .slides }}<a class="label" href="{{ . | relURL }}">{{ i18n "slides" }}</a>{{ end }}
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
