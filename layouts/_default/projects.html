{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="content">{{ . }}</div>{{ end }}
  </header>
  <ul class="card-list">
    {{ range site.Data.projects }}
    <li>
      <a href="{{ .url }}">{{ .name }}</a>
      <span class="meta">{{ .desc }}</span>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
