{{ define "main" }}
<header><h1>{{ .Title }}</h1>{{ with .Content }}<div class="content">{{ . }}</div>{{ end }}</header>
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    <span class="meta">{{ .Date.Format "2006" }}</span>
  </li>
  {{ end }}
</ul>
{{ end }}
