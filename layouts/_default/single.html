{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ if eq .Section "posts" }}{{ partial "post-meta.html" . }}{{ end }}
  </header>
  {{ with .Params.cover }}{{ with .image }}<img class="post-cover" src="{{ . | relURL }}" alt="{{ $.Title }}">{{ end }}{{ end }}
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
